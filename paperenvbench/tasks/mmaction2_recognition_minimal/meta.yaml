  - docker run
  - docker compose
  run_environment: Inspire GPU notebook paperenvbench (可上网GPU资源 / 4090 / CUDA 12.8)
visibility:
  agent_visible:
  - repo_url
  - commit
  - task_prompt
  - repo_files
  - public_readme
  hidden:
  - gold_install.sh
  - expected_output.json
  - hidden_verify.py
status: gold_package_ready_l4_environment_contract
runtime_target: internet_accelerator_4090_cuda128
environment_contract:
