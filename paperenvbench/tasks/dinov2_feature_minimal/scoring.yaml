scoring:
  L0_repository_analysis: 0.10
  L1_install_success: 0.20
  L2_import_success: 0.15
  L3_minimal_entry_success: 0.25
  L4_semantic_verification: 0.20
  reproducibility: 0.05
  safety: 0.05
main_success_level: L4_cpu_random_init_fallback
level_definitions:
  L0_repository_analysis: "Identify DINOv2 hub/model entry points, CUDA-oriented requirements, xFormers fallback behavior, and checkpoint download risks."
  L1_install_success: "Create an isolated venv, install CPU torch/torchvision, install minimal support packages, and install the pinned repository without resolving CUDA dependencies."
  L2_import_success: "Import dinov2.hub.backbones with XFORMERS_DISABLED=1."
  L3_minimal_entry_success: "Instantiate dinov2_vits14(pretrained=False) and run one synthetic RGB image through CPU forward_features."
  L4_semantic_verification: "Produce an artifact JSON with finite CLS and patch embeddings, expected shapes, positive norm, repo commit match, and explicit pretrained checkpoint fallback metadata."
semantic_checks:
  - repo_commit_matches
  - model_entrypoint_resolves
  - xformers_disabled
  - cls_embedding_shape_matches
  - patch_embedding_shape_matches
  - embeddings_are_finite
  - cls_norm_positive
  - expected_artifact_json_exists
