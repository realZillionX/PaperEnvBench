task_id: speechbrain_keyword_spotting
paper_title: 'SpeechBrain: A General-Purpose Speech Toolkit'
repo_url: https://github.com/speechbrain/speechbrain
commit: 8a89ebad72af734b75bbd37565ae96a6819e146b
paper_url: https://arxiv.org/abs/2106.04624
license: Apache-2.0
split: test
modality:
  primary: audio_speech
  secondary:
  - keyword_spotting
  - checkpoint_loading
  - pretrained_inference
environment_challenges:
- checkpoint_download
- torch_cuda_matrix
- hidden_dependency
- dataset_asset_missing
- verification_ambiguity
verification:
  type:
  - import_graph
  - single_sample_inference
  - output_artifact
  - semantic_check
  command: python verify.py --check-only --json
  minimum_success_level: L4_minimal_reproduction
hardware:
  gpu_required: true
  gpu_optional: false
  min_vram_gb: 16
  accelerator: NVIDIA GeForce RTX 4090
  cuda_required: true
platform_constraints:
  package_manager:
  - venv
  - pip
  forbidden:
  - docker build
  - docker run
  - docker compose
  run_environment: Inspire GPU notebook paperenvbench (可上网GPU资源 / 4090 / CUDA 12.8)
visibility:
  agent_visible:
  - repo_url
  - commit
  - task_prompt
  - repo_files
  - public_readme
  - huggingface_model_name
  hidden:
  - gold_install.sh
  - expected_output.json
  - hidden_verify.py
status: gold_verified_l4
runtime_target: internet_accelerator_4090_cuda128
environment_contract:
  runtime_target: internet_accelerator_4090_cuda128
  dependency_profiles:
  - accelerator_runtime_base
  - gpu_occupancy_guard
  - torch_vision_audio_cuda_matrix
  gpu:
    required_for_standard_reproduction: true
    cuda_required: true
    accelerator: NVIDIA GeForce RTX 4090
    min_vram_gb: 16
    gpu_occupancy_floor_percent: 15
  l4_requires:
  - requires_profile_closure_pass
  - requires_gpu_cuda_evidence
  - requires_minimal_reproduction_experiment
  - disallow_blocked_or_deferred_dependencies
