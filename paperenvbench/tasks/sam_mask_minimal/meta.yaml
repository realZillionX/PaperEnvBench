task_id: sam_mask_minimal
paper_title: Segment Anything
repo_url: https://github.com/facebookresearch/segment-anything
commit: dca509f
paper_url: https://arxiv.org/abs/2304.02643
license: Apache-2.0
split: dev
modality:
  primary: object_detection_segmentation
  secondary:
  - checkpoint_loading
  - output_artifact
environment_challenges:
- checkpoint_download
- system_package_missing
- torch_cuda_matrix
- hardware_pressure
verification:
  type:
  - checkpoint_loading
  - single_sample_inference
  - output_artifact
  - semantic_check
  command: python verify.py --check-only --json
  minimum_success_level: L4_minimal_reproduction
hardware:
  gpu_required: true
  gpu_optional: false
  min_vram_gb: 24
  accelerator: NVIDIA GeForce RTX 4090
  cuda_required: true
platform_constraints:
  package_manager:
  - venv
  - pip
  forbidden:
  - docker build
  - docker run
  - docker compose
  run_environment: Inspire GPU notebook paperenvbench (可上网GPU资源 / 4090 / CUDA 12.8)
visibility:
  agent_visible:
  - repo_url
  - commit
  - task_prompt
  - repo_files
  - public_readme
  hidden:
  - gold_install.sh
  - expected_output.json
  - hidden_verify.py
status: gold_verified_l4
runtime_target: internet_accelerator_4090_cuda128
environment_contract:
  runtime_target: internet_accelerator_4090_cuda128
  dependency_profiles:
  - accelerator_runtime_base
  - gpu_occupancy_guard
  - torch_vision_audio_cuda_matrix
  gpu:
    required_for_standard_reproduction: true
    cuda_required: true
    accelerator: NVIDIA GeForce RTX 4090
    min_vram_gb: 24
    gpu_occupancy_floor_percent: 15
  l4_requires:
  - requires_profile_closure_pass
  - requires_gpu_cuda_evidence
  - requires_minimal_reproduction_experiment
  - disallow_blocked_or_deferred_dependencies
