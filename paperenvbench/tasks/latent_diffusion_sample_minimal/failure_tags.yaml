primary_failure_tags:
  - checkpoint_download
  - torch_cuda_matrix
  - hidden_dependency
  - system_package_missing
anti_patterns:
  - "Accepting import success without checking the pinned latent-diffusion config, sampler, and autoencoder route."
  - "Downloading the full text-to-image checkpoint during check-only verification instead of using cached assets or a documented CPU fallback."
  - "Replacing repository entrypoints with a diffusers pipeline without recording the CompVis latent-diffusion route."
