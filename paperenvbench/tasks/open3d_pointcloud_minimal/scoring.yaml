scoring:
  L0_repository_analysis: 0.10
  L1_install_success: 0.20
  L2_import_success: 0.15
  L3_minimal_entry_success: 0.25
  L4_semantic_verification: 0.20
  reproducibility: 0.05
  safety: 0.05
main_success_level: L4_cpu_deterministic_fallback
level_definitions:
  L0_repository_analysis: "Identify Open3D's CMake/native build surface, Python package entry point, and visualization dependency risks."
  L1_install_success: "Create an isolated venv, install a pinned Open3D wheel, and keep the pinned source repository checkout for provenance."
  L2_import_success: "Import open3d and resolve geometry.PointCloud, KDTreeSearchParamKNN, and utility.Vector3dVector."
  L3_minimal_entry_success: "Create a deterministic synthetic point cloud and execute CPU normal estimation plus voxel downsampling."
  L4_semantic_verification: "Produce an artifact JSON with repo commit match, Open3D route evidence, expected point / normal / voxel counts, unit normals, finite geometry values, and deterministic hashes."
semantic_checks:
  - repo_commit_matches
  - open3d_import_resolves
  - pointcloud_route_recorded
  - point_count_matches
  - normal_count_matches
  - voxel_count_matches
  - normal_lengths_unit
  - finite_geometry_values
  - expected_artifact_json_exists
