scoring:
  L0_repository_analysis: 0.1
  L1_install_success: 0.2
  L2_import_success: 0.15
  L3_minimal_entry_success: 0.25
  L4_semantic_verification: 0.2
  reproducibility: 0.05
  safety: 0.05
main_success_level: L4_minimal_reproduction
level_definitions:
  L0_repository_analysis: Identify VideoMAE classification entry points, full-training
    dependency risks, checkpoint optionality, and CPU-compatible verification route.
  L1_install_success: Create an isolated venv, clone the pinned VideoMAE repo, and
    install pinned torch, torchvision, timm, NumPy, Pillow, and PyYAML dependencies.
  L2_import_success: Import the pinned repo's modeling_finetune module and construct
    a VideoMAE classification model.
  L3_minimal_entry_success: Run a deterministic synthetic video through PatchEmbed
    Conv3d, transformer blocks, pooling, and classification head on CPU.
  L4_semantic_verification: Produce a video-strip PNG and summary JSON with finite
    logits, expected feature/logit shapes, expected tubelet patch geometry, and non-empty
    artifact.
semantic_checks:
- repo_commit_matches
- video_shape_matches
- patch_embed_uses_conv3d
- tubelet_kernel_matches
- num_temporal_spatial_tokens_matches
- features_shape_matches
- logits_shape_matches
- logits_are_finite
- probabilities_sum_to_one
- artifact_png_nonempty
l4_environment_gate:
  runtime_target: internet_accelerator_4090_cuda128
  requires_profile_closure_pass: true
  requires_gpu_cuda_evidence: true
  requires_minimal_reproduction_experiment: true
  disallow_blocked_or_deferred_dependencies: true
