scoring:
  L0_repository_analysis: 0.1
  L1_install_success: 0.2
  L2_import_success: 0.2
  L3_minimal_entry_success: 0.25
  L4_semantic_verification: 0.15
  reproducibility: 0.05
  safety: 0.05
main_success_level: L4_minimal_reproduction
semantic_checks:
- repo_commit_matches
- segformer_config_loaded
- model_built_from_mmseg_registry
- logits_shape_matches
- logits_are_finite
- logits_have_variance
- probabilities_are_normalized
- mask_png_exists
- mask_pixels_match_input
- mmcv_ops_stub_not_called
l4_environment_gate:
  runtime_target: internet_accelerator_4090_cuda128
  requires_profile_closure_pass: true
  requires_gpu_cuda_evidence: true
  requires_minimal_reproduction_experiment: true
  disallow_blocked_or_deferred_dependencies: true
