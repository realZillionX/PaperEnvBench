      - "Run a tiny frame-stack tensor or video classification forward-path smoke."
    depends_on:
      - torch_vision_audio_cuda_matrix
    command:
      - "{python}"
      - tools/paper_repo_env/accelerator_runtime_probe.py
      - "--json"
