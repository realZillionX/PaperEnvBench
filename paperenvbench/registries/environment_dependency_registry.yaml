      - checkpoints_and_assets
      - key_experiment_smokes
    key_validation_experiments:
      - "Probe CUDA rasterizer, KNN, OpenPCDet, Nerfstudio, gsplat, tiny-cuda-nn or Open3D surfaces as task-relevant."
      - "Run a tiny point cloud, voxel, ray-marching, rasterization or scene artifact smoke."
    depends_on:
