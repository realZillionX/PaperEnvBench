version: 0.4.0
updated_at: "2026-05-17"
purpose: >
  Register native environment dependency profiles for PaperEnvBench tasks. Profiles cover
  Python package matrices, system libraries, accelerator runtimes, native extensions,
  checkpoint gates, and minimal dependency probes used before or alongside task verifiers.
policy:
  l4_environment_contract: >
    Every accepted attempt must preserve the full dependency boundary in a structured
    environment_dependency_report.json. Large checkpoints, CUDA wheels, native extensions,
    datasets, system libraries, simulators, rendering stacks, license gates, and API gates
    must be explicitly included in the dependency inventory. A lightweight artifact route
    may still be valid when checkpoints, licenses, memory, native builds, datasets, or
    runtime limits block a full route, but the attempt must record what was installed,
    what was probed, what was blocked, and the concrete evidence for any reduced route.
    Do not omit a dependency merely because it is large or inconvenient.
  gpu_utilization_floor_percent: 15
  environment_report_required_sections:
    - runtime
    - python_packages
    - dependency_profiles
    - route_boundary
    - dependency_inventory
    - heavyweight_dependency_decisions
    - verification
    - validation_experiments
  dependency_axes:
    - python_packages
    - system_packages
    - accelerator_runtime
    - native_extensions
    - checkpoints_and_assets
    - license_or_api_gates
    - cache_paths
    - full_dependency_inventory
    - heavyweight_dependency_decisions
    - blocked_dependency_evidence
    - key_experiment_smokes

runtime_targets:
  internet_accelerator_4090_cuda128:
    workspace: "可上网GPU资源"
    notebook: paperenvbench-4
    project: "CI-情境智能"
    compute_group: "4090-cuda12.8-2"
    accelerator: "NVIDIA GeForce RTX 4090"
    accelerator_memory_gb: 48
    driver_observed: "570.124.06"
    cuda_observed: "12.8"
    python: "3.12"
    status: active_probe_target

probe_profiles:
  accelerator_runtime_base:
    description: "Runtime discovery plus CUDA-enabled torch tensor smoke."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - accelerator_runtime
      - python_packages
    key_validation_experiments:
      - "nvidia-smi reports a visible NVIDIA GPU, driver and memory."
      - "torch.cuda.is_available() is true and a CUDA tensor matmul completes."
    command:
      - "{python}"
      - tools/paper_repo_env/accelerator_runtime_probe.py
      - "--json"
      - "--strict"
    expected:
      - nvidia_smi.gpus
      - torch.cuda_available
      - torch.device_name

  gpu_occupancy_guard:
    description: "Bounded CUDA matmul workload proving that the active runtime can raise visible GPU utilization above 15%."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - accelerator_runtime
      - key_experiment_smokes
    key_validation_experiments:
      - "Run bounded CUDA matmul and verify nvidia-smi utilization reaches at least 15%."
    depends_on:
      - accelerator_runtime_base
    command:
      - "{python}"
      - tools/paper_repo_env/gpu_occupancy_guard.py
      - "--json"
      - "--strict"
      - "--min-utilization"
      - "15"
      - "--duration-seconds"
      - "20"
      - "--warmup-seconds"
      - "3"
    expected:
      - summary.max_utilization_gpu_percent>=15
      - preflight.cuda_available
      - status=pass

  torch_vision_audio_cuda_matrix:
    description: "CUDA-aware torch / torchvision / torchaudio wheel matrix."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - python_packages
      - accelerator_runtime
      - key_experiment_smokes
    key_validation_experiments:
      - "Record torch, torchvision and torchaudio versions from one compatible wheel row."
      - "Run a CUDA tensor smoke and import torchvision / torchaudio successfully."
    depends_on:
      - gpu_occupancy_guard
    command:
      - "{python}"
      - tools/paper_repo_env/accelerator_runtime_probe.py
      - "--json"
      - "--strict"
      - "--module"
      - torchvision
      - "--module"
      - torchaudio
    expected:
      - torch.version
      - torch.cuda_compiled
      - torchvision.version
      - torchaudio.version

  native_python_build_runtime:
    description: "Compiler, Python headers, CMake, Ninja and build-tool surfaces for native Python extensions."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - system_packages
      - native_extensions
    key_validation_experiments:
      - "Probe Python.h, extension suffix, gcc or clang, g++, cmake, ninja, make and pkg-config."
    command:
      - "{python}"
      - tools/paper_repo_env/probes/native_build_probe.py
      - "--json"
    expected:
      - python_headers.python_h_exists
      - compiler_available

  openmmlab_native_ops:
    description: "MMCV / MMEngine / OpenMMLab native op imports and structured blockers."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - python_packages
      - native_extensions
      - accelerator_runtime
      - key_experiment_smokes
    key_validation_experiments:
      - "Import mmcv._ext and mmcv.ops symbols such as nms or RoIAlign when available."
      - "Run an OpenMMLab config or native-op smoke and record blockers for mmcv-lite or missing CUDA ops."
    depends_on:
      - native_python_build_runtime
      - torch_vision_audio_cuda_matrix
    command:
      - "{python}"
      - tools/paper_repo_env/probes/openmmlab_native_probe.py
      - "--json"

  detectron_grounding_native_ops:
    description: "Detectron2 and GroundingDINO C++ / CUDA extension surfaces."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - python_packages
      - native_extensions
      - accelerator_runtime
      - checkpoints_and_assets
      - key_experiment_smokes
    key_validation_experiments:
      - "Probe detectron2._C or groundingdino._C native extension imports."
      - "Run nms / ROIAlign / phrase-grounding related smoke when the extension and checkpoint boundary permit it."
    depends_on:
      - native_python_build_runtime
      - torch_vision_audio_cuda_matrix
    command:
      - "{python}"
      - tools/paper_repo_env/probes/detectron_grounding_probe.py
      - "--json"

  video_native_runtime:
    description: "Video model runtime dependencies, optional native surfaces, and tensor smoke."
    runtime_target: internet_accelerator_4090_cuda128
    evidence_axes:
      - python_packages
      - system_packages
