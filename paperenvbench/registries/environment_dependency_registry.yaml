    key_validation_experiments:
      - "Probe Gym or Gymnasium, rendering/display blockers, MuJoCo or simulator gates when task-relevant."
      - "Run a short deterministic rollout or one-step policy/training smoke and record reward, episode length or loss metrics."
    depends_on:
