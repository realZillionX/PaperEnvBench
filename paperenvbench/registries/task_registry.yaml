version: 0.2.0
updated_at: "2026-05-16"
selection_policy:
  goal: "维护 50 个 PaperEnvBench 主任务的有效清单与 gold 构建状态。"
  constraints:
    - "Python 主导，允许少量 C++ / CUDA extension，但最终路线不得依赖 Docker。"
    - "必须能固定 commit，并构造 single-sample inference、checkpoint loading、output artifact 或 metric smoke test。"
    - "资产必须可控：优先使用合成输入、公开小权重、公共模型缓存或可替代 toy dataset。"
    - "避免只验证 import 的任务、纯工程库任务、需要私有 API / gated license 的任务，以及完整训练才有意义的任务。"
  live_checks:
    - "2026-05-16 用 GitHub API metadata 对 50 个主任务 repo 做 URL 存活校验，均返回 HTTP 200。"
  split_counts:
    dev: 20
    val: 10
    test: 20
  taxonomy_counts:
    audio_speech: 5
    image_classification_representation: 5
    object_detection_segmentation: 6
    video_understanding_generation: 5
    vision_language_multimodal: 6
    llm_nlp: 6
    diffusion_generation: 5
    graph_learning_recommender: 4
    reinforcement_learning_simulation: 4
    scientific_geometry_3d: 4

